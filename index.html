<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PinSeeker | East Lothian Links</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --surface: rgba(30, 41, 59, 0.85); --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f1f5f9; --text-muted: #94a3b8; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); background-image: linear-gradient(rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.88)), url('https://images.unsplash.com/photo-1596245084930-9759c836696d?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--text); padding: 0; margin: 0; font-size: 13px; }
        .brand-header { padding: 25px 15px; text-align: center; border-bottom: 1px solid var(--border); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #0ea5e9); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); margin-bottom: 8px; font-size: 20px; }
        .main-title { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: -1px; }
        .controls { background: var(--surface); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
        .setup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        select, input { background: rgba(15, 23, 42, 0.7); color: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 13px; outline: none; width: 100%; appearance: none; }
        .btn-row { display: flex; justify-content: space-between; gap: 8px; }
        button { padding: 10px 14px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-add { background: var(--success); color: #fff; }
        .btn-save { background: #f59e0b; color: #fff; }
        .btn-reset { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        table { border-collapse: collapse; width: 100%; background: var(--surface); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        th { background: rgba(17, 24, 39, 0.95); color: var(--text-muted); padding: 10px 4px; font-size: 10px; }
        td { border-bottom: 1px solid var(--border); padding: 10px 2px; text-align: center; }
        .score-in { width: 35px; text-align: center; font-weight: 800; font-size: 16px; background: rgba(15, 23, 42, 0.6); color: #fff; border: 1px solid var(--border); border-radius: 4px; }
        .pts-label { color: var(--accent); font-size: 10px; font-weight: bold; display: block; }
        .dist-label { color: var(--text-muted); font-size: 10px; }
        .sub-row { background: rgba(51, 65, 85, 0.7); font-weight: bold; }
        .total-row { background: var(--accent) !important; color: #0f172a !important; font-weight: 800; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="brand-header">
        <div class="logo-icon">⛳</div>
        <div class="main-title">PinSeeker</div>
    </div>

    <div class="controls">
        <div class="setup-row">
            <select id="courseSelect" onchange="populateTees()">
                <option value="">-- Course --</option>
            </select>
            <select id="teeSelect" onchange="loadSelectedCourse()">
                <option value="">-- Tee --</option>
            </select>
        </div>
        <div class="btn-row">
            <div>
                <button class="btn-add" onclick="addP()">+ Player</button>
                <button class="btn-save" onclick="saveToHistory()">💾 Archive</button>
            </div>
            <button class="btn-reset" onclick="wipe()">Clear</button>
        </div>
    </div>

    <div id="app" style="padding: 10px; overflow-x: auto;"></div>
</div>

  },
  "The Glen": {

    "Yellow": { "dist": [330,361,343,178,368,488,364,409,200,344,336,448,136,333,467,186,394,363], "pars": [4,4,4,3,4,5,4,4,3,4,4,4,3,4,5,3,4,4], "si": [9,13,7,17,3,1,15,5,11,10,14,2,16,6,18,8,4,12] },
    "Red": { "dist": [327,343,334,162,354,467,360,379,197,340,319,432,128,321,399,179,374,358], "pars": [4,4,4,3,4,5,4,4,4,4,4,5,3,4,5,3,5,4], "si": [7,9,11,15,3,1,13,5,18,2,14,12,17,4,8,10,16,6] }
  }
};

    var STORAGE_KEY = "PINSEEKER_V23";
    var golfData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        course: "", tee: "", players: [],
        pars: new Array(18).fill(4), si: new Array(18).fill(9), dist: new Array(18).fill(0),
        history: []
    };

    function populateTees() {
        const cName = document.getElementById('courseSelect').value;
        const teeSelect = document.getElementById('teeSelect');
        teeSelect.innerHTML = '<option value="">-- Tee --</option>';
        if (COURSE_LIBRARY[cName]) {
            Object.keys(COURSE_LIBRARY[cName]).forEach(t => {
                let opt = document.createElement('option');
                opt.value = t; opt.innerText = t;
                teeSelect.appendChild(opt);
            });
        }
    }

    function loadSelectedCourse() {
        const cName = document.getElementById('courseSelect').value;
        const tee = document.getElementById('teeSelect').value;
        if (COURSE_LIBRARY[cName] && COURSE_LIBRARY[cName][tee]) {
            const data = COURSE_LIBRARY[cName][tee];
            golfData.course = cName; golfData.tee = tee;
            golfData.pars = [...data.pars]; golfData.si = [...data.si]; golfData.dist = [...data.dist];
            saveAndRender();
        }
    }

    function addP() {
        var n = prompt("Player Name:"); if(!n) return;
        var h = prompt("Handicap:", "0");
        golfData.players.push({name: n, hcp: parseInt(h)||0, scores: new Array(18).fill(0)});
        saveAndRender();
    }

    function updateVal(type, hIdx, pIdx, val) {
        var num = parseInt(val) || 0;
        if(type === 'score') golfData.players[pIdx].scores[hIdx] = num;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(golfData));
        render(); 
    }

    function calcPts(p, hIdx, score) {
        if(!score || score <= 0) return 0;
        let allow = Math.floor(p.hcp/18) + ((p.hcp%18) >= golfData.si[hIdx] ? 1 : 0);
        return Math.max(0, (golfData.pars[hIdx] + 2) - (score - allow));
    }

    function render() {
        let html = "";
        if(golfData.players.length > 0) {
            html = "<table><tr><th>Hole</th><th>Info</th>";
            golfData.players.forEach(p => html += `<th>${p.name}<br><small>Hcp ${p.hcp}</small></th>`);
            html += "</tr>";
            for(let h=0; h<18; h++) {
                if(h === 9) html += genSumRow("OUT", 0, 8);
                html += `<tr><td>${h+1}</td><td><span class="dist-label">${golfData.dist[h]}y</span><br><b style="color:#fbbf24">P${golfData.pars[h]}</b> <small style="color:#f87171">SI${golfData.si[h]}</small></td>`;
                golfData.players.forEach((p, pi) => {
                    html += `<td><input type='number' class='score-in' value='${p.scores[h]||""}' oninput='updateVal(\"score\",${h},${pi},this.value)'><span class='pts-label'>${calcPts(p, h, p.scores[h])}p</span></td>`;
                });
                html += "</tr>";
            }
            html += genSumRow("IN", 9, 17) + genSumRow("TOTAL", 0, 17) + "</table>";
        }
        document.getElementById('app').innerHTML = html || "<div style='text-align:center; padding:40px; color:#94a3b8;'>Select a course and add players.</div>";
    }

    function genSumRow(lbl, s, e) {
        let pSum = 0; for(let k=s; k<=e; k++) pSum += golfData.pars[k];
        let row = `<tr class='${lbl === "TOTAL" ? "total-row" : "sub-row"}'><td>${lbl}</td><td>Par ${pSum}</td>`;
        golfData.players.forEach(p => {
            let g=0, pts=0;
            for(let j=s; j<=e; j++) { if(p.scores[j]>0) { g+=p.scores[j]; pts+=calcPts(p,j,p.scores[j]); } }
            row += `<td>G:${g} P:${pts}</td>`;
        });
        return row + "</tr>";
    }

    function init() {
        const cs = document.getElementById('courseSelect');
        Object.keys(COURSE_LIBRARY).sort().forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            cs.appendChild(opt);
        });
        render();
    }

    function saveAndRender() { localStorage.setItem(STORAGE_KEY, JSON.stringify(golfData)); render(); }
    function wipe() { if(confirm("Clear current round?")) { golfData.players=[]; saveAndRender(); } }
    init();
</script>
</body>
</html>
